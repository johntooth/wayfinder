# On-demand environment stamping from the Actions UI (ADR-034 Decision 4).
#
# Optional — inert until the consumer configures:
#   repository variables: AWS_REGION, TF_STATE_BUCKET
#   repository secret:    AWS_PROVISIONER_ROLE_ARN (OIDC role with the infra permissions)
#
# The runner must be able to reach the shared RDS server for the postgresql
# provider (self-hosted runner in the VPC, or an allow-listed IP) — see
# infra/aws/README.md.
name: Provision environment

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment name (2-15 chars, lowercase, hyphen ok)"
        required: true
        type: string
      action:
        description: "What to do"
        required: true
        type: choice
        options: [plan, apply, destroy]
      enable_semchunk:
        description: "Deploy the semantic-chunking sidecar (ADR-030)"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: provision-${{ inputs.env_name }}

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        run: |
          if [ -z "${{ vars.AWS_REGION }}" ] || [ -z "${{ vars.TF_STATE_BUCKET }}" ] || [ -z "${{ secrets.AWS_PROVISIONER_ROLE_ARN }}" ]; then
            echo "::error::Provisioning is not configured — set the AWS_REGION and TF_STATE_BUCKET repository variables and the AWS_PROVISIONER_ROLE_ARN secret (see infra/aws/README.md)."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROVISIONER_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Init environments stack
        working-directory: infra/aws/environments
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Stamp / plan environment
        if: inputs.action != 'destroy'
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
        run: |
          FLAGS=""
          [ "${{ inputs.action }}" = "plan" ] && FLAGS="--plan"
          [ "${{ inputs.enable_semchunk }}" = "true" ] && FLAGS="$FLAGS --enable-semchunk"
          TF_IN_AUTOMATION=1 TF_INPUT=0 TF_CLI_ARGS_apply="-auto-approve" \
            ./infra/aws/scripts/new-environment.sh "${{ inputs.env_name }}" $FLAGS

      - name: Destroy environment
        if: inputs.action == 'destroy'
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
        run: |
          TF_IN_AUTOMATION=1 TF_INPUT=0 \
            ./infra/aws/scripts/destroy-environment.sh "${{ inputs.env_name }}" --auto-approve
