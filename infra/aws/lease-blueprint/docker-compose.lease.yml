# Wayfinder — sandbox-lease runtime bundle.
#
# Self-contained single-host stack: Postgres (pgvector) + MinIO object store +
# the Wayfinder app (migrate -> web + api). The ONLY external AWS dependency at
# runtime is Amazon Bedrock, reached with the SageMaker notebook's execution
# role — no API key, no static credentials, nothing to configure post-lease.
#
# All services share the host network so that:
#   1. the web/api containers reach the EC2 Instance Metadata Service (IMDS) at
#      hop-limit 1 and pick up the notebook execution role for Bedrock, and
#   2. service-to-service wiring is plain localhost:<port>.
#
# Brought up automatically by wayfinder-lease-blueprint.yaml's notebook
# lifecycle script, which first builds the app image:
#   docker build -t wayfinder-app:latest .
name: wayfinder-lease

services:
  postgres:
    image: pgvector/pgvector:pg16
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wayfinder
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  storage:
    image: minio/minio:latest
    network_mode: host
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12

  # One-shot schema migration. App migrations also run on container start, but
  # doing it here gates web/api on a clean schema.
  migrate:
    image: wayfinder-app:latest
    network_mode: host
    command: pnpm --filter @rbrasier/adapters db:migrate
    env_file: .env.lease
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: wayfinder-app:latest
    network_mode: host           # binds :3000 on the host; reachable via the notebook proxy /proxy/3000/
    command: pnpm --filter @wayfinder/web dev
    env_file: .env.lease
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    image: wayfinder-app:latest
    network_mode: host           # binds :3001 on the host
    command: pnpm --filter @wayfinder/api exec tsx src/index.ts
    env_file: .env.lease
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
